# 微信公众号文章抓取配置示例
# 复制此文件为 config.yaml，然后填写你的实际配置
# 也可以运行时用 --save-dir 参数临时指定保存目录

accounts:
  - name: "公众号A"
    save_dir: "D:/我的笔记/公众号/公众号A"   # ← 改成你想要的任意文件夹，不存在会自动创建
    default: true          # 不带 --account 参数时使用此配置

  - name: "公众号B"
    save_dir: "D:/我的笔记/公众号/公众号B"

database:
  path: "data/state/app.db"

logging:
  level: "INFO"
  log_dir: "data/logs"

fetch:
  timeout: 30
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36 MicroMessenger/7.0.20.1781(0x6700143B) NetType/WIFI MiniProgramEnv/Windows WindowsWechat/XWEB/11581 XWEB/1221 Flue"
